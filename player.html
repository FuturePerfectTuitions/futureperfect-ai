<!doctype html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lesson Player</title>
  <link rel="stylesheet" href="shared.css" />

  <style>
    /* Keep within your existing look */
    .playerWrap{
      width:min(980px, 96%);
      margin:0 auto;
      text-align:left;
    }

    .playerTitle{
      margin:0 0 14px;
      font-size:26px;
      font-weight:900;
      letter-spacing:-0.01em;
      text-align:center;
    }

    .videoFrame{
      width:100%;
      aspect-ratio:16/9;
      border:1px solid rgba(0,0,0,0.10);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 18px 40px rgba(0,0,0,0.10);
      background:#000;
    }

    .videoFrame iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
    }

    .tinyNote{
      margin-top:14px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
      text-align:center;
      font-weight:700;
    }
  </style>
</head>

<body>
  <div class="topbar">
    <a href="https://futureperfect.education/" class="topbarLogoLink">
      <img src="assets/fpt-logo.png" class="topbarLogo" alt="Future Perfect Tuitions" />
    </a>
    <button class="topbarLogout" onclick="logout()">Log out</button>
  </div>

  <main class="appMain">
    <div class="card wide">

      <h1 id="yearHeading" class="yearHeading">Lesson</h1>

      <div class="playerWrap">
        <div id="lessonTitle" class="playerTitle">Loading…</div>

        <div class="videoFrame">
          <iframe
            id="vid"
            src=""
            allow="autoplay; fullscreen; picture-in-picture"
            allowfullscreen
            referrerpolicy="no-referrer"
          ></iframe>
        </div>

        <div class="tinyNote">
          🔒 Videos are proprietary material belonging to Future Perfect Tuitions and must not be shared outside of Future Perfect Tuitions.
        </div>
      </div>

      <div class="cardFooter">
        <a id="backBtn" class="btnRed">Back</a>
      </div>

    </div>

    <div id="siteFooter"></div>
  </main>

  <script src="footer.js"></script>

  <script>
    const u = sessionStorage.getItem("fpt_user");
    const p = sessionStorage.getItem("fpt_pass");
    if (!u || !p) location.href = "index.html";

    function logout() {
      sessionStorage.clear();
      location.href = "index.html";
    }

    const qs = new URLSearchParams(location.search);

    // These come from lessons.html links
    const sp = (qs.get("sp") || "").trim();
    const title = (qs.get("title") || "Lesson").trim();
    const year = (qs.get("year") || "").trim();
    const subject = (qs.get("subject") || "").trim();
    const type = (qs.get("type") || "lessons").trim();

    // Headings + back link
    function yearLabel(code) {
      const match = code.match(/^Y(\d)(?:_(11plus))?/);
      if (!match) return code || "Lesson";
      const yearNum = match[1];
      const is11 = match[2];
      return is11 ? ("Year " + yearNum + " 11+") : ("Year " + yearNum);
    }

    document.getElementById("yearHeading").textContent = yearLabel(year);
    document.getElementById("lessonTitle").textContent = title;

    document.getElementById("backBtn").href =
      "lessons.html?year=" + encodeURIComponent(year) +
      "&subject=" + encodeURIComponent(subject) +
      "&type=" + encodeURIComponent(type);

    // If sp missing, fail nicely
    if (!sp) {
      document.getElementById("lessonTitle").textContent = "Missing video link";
    } else {
      // Embed ScreenPal inside your portal page
      // If your LIVE site used a different embed URL, tell me and I’ll match it exactly.
      document.getElementById("vid").src =
        "https://screenpal.com/watch/" + encodeURIComponent(sp);
    }
  </script>
</body>
</html>
