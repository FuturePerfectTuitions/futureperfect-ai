<!doctype html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lessons</title>
  <link rel="stylesheet" href="shared.css" />

  <style>
    /* In-page embedded player (matches your old behaviour) */
    .playerWrap{
      margin-top: 22px;
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 18px;
      overflow: hidden;
      display: none;
      background: #fff;
      box-shadow: 0 18px 40px rgba(0,0,0,0.10);
    }

    .playerHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      border-bottom:1px solid rgba(0,0,0,0.08);
    }

    .playerTitle{
      font-weight: 900;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }

    .playerBox{
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background:#000;
    }

    .playerBox iframe{
      position:absolute;
      top:0; left:0;
      width:100%;
      height:100%;
      border:0;
      display:block;
    }

    /* Use your existing button styling for Close */
    .btnPlain{
      border:1px solid rgba(0,0,0,0.10);
      background:#fff;
      padding:10px 14px;
      border-radius:12px;
      font-weight:800;
      cursor:pointer;
      color:var(--text);
    }

    .btnPlain:active{ transform: translateY(1px); }
  </style>
</head>

<body>
  <div class="topbar">
    <a href="https://futureperfect.education/" class="topbarLogoLink">
      <img src="assets/fpt-logo.png" class="topbarLogo" alt="Future Perfect Tuitions" />
    </a>
    <button class="topbarLogout" onclick="logout()">Log out</button>
  </div>

  <main class="appMain">
    <div class="card wide">

      <h1 id="yearHeading" class="yearHeading">Year</h1>

      <div class="centerBlock">
        <div id="title" class="pageHeading">Lessons</div>

        <div id="list"></div>
        <div id="error"></div>

        <!-- Embedded player (same page, branded) -->
        <div id="playerWrap" class="playerWrap">
          <div class="playerHeader">
            <div class="playerTitle" id="playerTitle">Lesson</div>
            <button class="btnPlain" type="button" id="closePlayerBtn">Close</button>
          </div>
          <div class="playerBox">
            <iframe
              id="player"
              src="about:blank"
              allow="autoplay; fullscreen; picture-in-picture"
              allowfullscreen
              scrolling="no"
              referrerpolicy="no-referrer"
            ></iframe>
          </div>
        </div>
      </div>

     <a id="backBtn" class="btnBackFloating">Back</a>

    </div>

    <div id="siteFooter"></div>
  </main>

  <script src="footer.js"></script>

  <script>
    const WORKER_BASE = "https://frosty-rain-828e.futureperfectlessons.workers.dev";

    const username = sessionStorage.getItem("fpt_user");
    const password = sessionStorage.getItem("fpt_pass");

    if (!username || !password) {
      location.href = "index.html";
    }

    function authHeader() {
      return "Basic " + btoa(username + ":" + password);
    }

    function logout() {
      sessionStorage.clear();
      location.href = "index.html";
    }

    const params = new URLSearchParams(location.search);
    const year = (params.get("year") || "").trim();
    const subject = (params.get("subject") || "").trim();
    const type = (params.get("type") || "lessons").trim(); // lessons | assessments | howto

    function yearLabel(code) {
      const match = code.match(/^Y(\d)(?:_(11plus))?/);
      if (!match) return code || "Year";
      const yearNum = match[1];
      const is11 = match[2];
      return is11 ? ("Year " + yearNum + " 11+") : ("Year " + yearNum);
    }

    document.getElementById("yearHeading").textContent = yearLabel(year);

    document.getElementById("title").textContent =
      (subject === "maths" ? "Maths" : "Verbal Reasoning") +
      " – " +
      (type === "assessments" ? "Assessments" : type === "howto" ? "How-To" : "Lessons");

    document.getElementById("backBtn").href =
      "options.html?year=" +
      encodeURIComponent(year) +
      "&subject=" +
      encodeURIComponent(subject);

    const listEl = document.getElementById("list");
    const errorEl = document.getElementById("error");

    // Player elements
    const playerWrap = document.getElementById("playerWrap");
    const player = document.getElementById("player");
    const playerTitle = document.getElementById("playerTitle");
    const closePlayerBtn = document.getElementById("closePlayerBtn");

    function screenpalEmbedUrl(spId) {
      const id = encodeURIComponent(spId);
      return `https://go.screenpal.com/player/${id}?ff=1&ahc=1&dcc=1&bg=transparent`;
    }

    function openLesson(lesson) {
      if (!lesson || !lesson.sp) return;

      playerTitle.textContent = lesson.title || "Lesson";
      player.src = screenpalEmbedUrl(lesson.sp);
      playerWrap.style.display = "block";
      playerWrap.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function closePlayer() {
      player.src = "about:blank";
      playerWrap.style.display = "none";
    }

    closePlayerBtn.addEventListener("click", closePlayer);

    async function loadLessons() {
      try {
        closePlayer();

        if (!year || !subject) {
          throw new Error("Missing year/subject in the link.");
        }

        // IMPORTANT: Worker expects "option", but the page uses "type"
        const res = await fetch(
          WORKER_BASE +
            "/lessons?year=" + encodeURIComponent(year) +
            "&subject=" + encodeURIComponent(subject) +
            "&option=" + encodeURIComponent(type),
          { headers: { Authorization: authHeader() } }
        );

        if (!res.ok) throw new Error("Failed to load.");

        const lessons = await res.json();
        listEl.innerHTML = "";
        errorEl.textContent = "";
        errorEl.className = "";

        lessons.forEach(lesson => {
          const div = document.createElement("div");
          div.className = "item";

          // If this is one of your assessment separator rows (sp:""), show as plain text
          if (!lesson.sp) {
            const strong = document.createElement("div");
            strong.style.fontWeight = "900";
            strong.style.color = "var(--muted)";
            strong.textContent = lesson.title || "";
            div.appendChild(strong);
            listEl.appendChild(div);
            return;
          }

          // Open in-page player (no ScreenPal navigation)
          const a = document.createElement("a");
          a.href = "#";
          a.textContent = lesson.title || "Lesson";
          a.addEventListener("click", (e) => {
            e.preventDefault();
            openLesson(lesson);
          });

          div.appendChild(a);
          listEl.appendChild(div);
        });

      } catch (err) {
        errorEl.className = "error";
        errorEl.textContent = err.message || "Error";
      }
    }

    loadLessons();
  </script>
</body>
</html>
