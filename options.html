<!doctype html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Options</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <a href="https://futureperfect.education/" class="topbarLogoLink">
      <img src="assets/fpt-logo.png" class="topbarLogo" alt="Future Perfect Tuitions" />
    </a>
    <button class="topbarLogout" type="button" onclick="logout()">Log out</button>
  </header>

  <main class="appMain">
    <section class="card wide">
      <!-- subtle red accent line -->
      <div class="leftAccent" aria-hidden="true"></div>

      <h1 class="yearHeading" id="yearHeading">Year</h1>

      <div class="centerBlock">
        <div class="pageHeading" id="subjectHeading">Subject</div>
        <div class="miniUnderline" aria-hidden="true"></div>
      </div>

      <div class="choices" id="choices"></div>
      <div id="error" class="error" style="display:none;"></div>

      <a id="backBtn" class="btnBackFloating">Back</a>
    </section>

    <div id="siteFooter"></div>
  </main>

  <script src="footer.js"></script>

  <script>
    const WORKER_BASE = "https://fpt-ai-beta.futureperfectlessons.workers.dev";

    // -----------------------
    // Auth guard
    // -----------------------
    const u = sessionStorage.getItem("fpt_user");
    const p = sessionStorage.getItem("fpt_pass");
    if (!u || !p) location.href = "index.html";

    function authHeader() {
      return "Basic " + btoa(u + ":" + p);
    }

    // -----------------------
    // Params + labels
    // -----------------------
    const params = new URLSearchParams(location.search);
    const yearParam = (params.get("year") || "").trim();      // e.g. Y4 or Y4_11plus
    const subjectParam = (params.get("subject") || "").trim(); // maths | vr | nvr | english (future)

    function yearLabel(code) {
      // Show "Year 4" or "Year 4 11+"
      const m = String(code || "").match(/^Y(\d)(?:_(11plus))?$/i);
      if (!m) return code || "Year";
      return m[2] ? `Year ${m[1]} 11+` : `Year ${m[1]}`;
    }

    function subjectLabel(s) {
      const t = (s || "").toLowerCase();
      if (t === "maths") return "Maths";
      if (t === "english") return "English";
      if (t === "vr") return "Verbal Reasoning";
      if (t === "nvr") return "Non-Verbal Reasoning";
      return (s || "Subject")
        .replace(/_/g, " ")
        .replace(/\b\w/g, ch => ch.toUpperCase());
    }

    function optionLabel(o) {
      if (o === "lessons") return "Lessons";
      if (o === "assessments") return "Assessments";
      if (o === "howto") return "How-To";
      return o;
    }

    function encode(v) { return encodeURIComponent(v || ""); }

    // Headings
    document.getElementById("yearHeading").textContent = yearLabel(yearParam);
    document.getElementById("subjectHeading").textContent = subjectLabel(subjectParam);

    // Back goes to subject selection
    document.getElementById("backBtn").href = `subject.html?year=${encode(yearParam)}`;

    // -----------------------
    // Render options from Worker (SOURCE OF TRUTH)
    // -----------------------
    const choices = document.getElementById("choices");
    const errorEl = document.getElementById("error");

    function showError(msg) {
      errorEl.style.display = "block";
      errorEl.textContent = msg || "Something went wrong.";
    }

    function addChoice(option) {
      // lessons.html expects ?type= (then it sends ?option= to the Worker)
      const a = document.createElement("a");
      a.className = "subject";
      a.href = `lessons.html?year=${encode(yearParam)}&subject=${encode(subjectParam)}&type=${encode(option)}`;
      a.textContent = optionLabel(option);
      choices.appendChild(a);
    }

    async function loadOptions() {
      try {
        choices.innerHTML = "";
        errorEl.style.display = "none";

        if (!yearParam || !subjectParam) {
          showError("Missing year or subject in the link.");
          return;
        }

        const res = await fetch(
          WORKER_BASE + "/options?year=" + encode(yearParam) + "&subject=" + encode(subjectParam),
          { headers: { Authorization: authHeader() } }
        );

        if (!res.ok) {
          const t = await res.text().catch(() => "");
          throw new Error(t || "Not authorised or failed to load options.");
        }

        const opts = await res.json(); // e.g. ["lessons","assessments"] or ["lessons","howto"]
        if (!Array.isArray(opts) || opts.length === 0) {
          showError("No options available for this subject.");
          return;
        }

        // Render exactly what Worker allows.
        // This guarantees assessments never appear on non-11+ track.
        opts.forEach(addChoice);

      } catch (err) {
        showError(err.message || "Failed to load options.");
      }
    }

    loadOptions();

    // -----------------------
    // Tab title: "Student @ Future Perfect Tuitions"
    // -----------------------
    function setTitleFromStorageOrUser(me) {
      const stored =
        sessionStorage.getItem("fpt_displayName") ||
        sessionStorage.getItem("fpt_name") ||
        (me && (me.name || me.student || me.displayName)) ||
        sessionStorage.getItem("fpt_user") ||
        "Student";

      document.title = `${stored} @ Future Perfect Tuitions`;
    }

    async function hydrateStudentName() {
      if (sessionStorage.getItem("fpt_displayName") || sessionStorage.getItem("fpt_name")) {
        setTitleFromStorageOrUser(null);
        return;
      }
      try {
        const res = await fetch(WORKER_BASE + "/me", { headers: { Authorization: authHeader() } });
        if (!res.ok) throw new Error("me failed");
        const me = await res.json();
        if (me && me.name) sessionStorage.setItem("fpt_name", me.name);
        setTitleFromStorageOrUser(me);
      } catch {
        setTitleFromStorageOrUser(null);
      }
    }

    hydrateStudentName();

    // -----------------------
    // Logout
    // -----------------------
    function logout() {
      sessionStorage.removeItem("fpt_user");
      sessionStorage.removeItem("fpt_pass");
      sessionStorage.removeItem("fpt_name");
      sessionStorage.removeItem("fpt_displayName");
      location.href = "index.html";
    }
    window.logout = logout;
  </script>

</body>
</html>
